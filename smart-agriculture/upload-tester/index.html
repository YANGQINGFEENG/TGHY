<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:3000">
  <title>智慧农业 - 数据上传测试工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- 头部 -->
    <header class="app-header">
      <div class="header-content">
        <div class="logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <h1>数据上传测试工具</h1>
        </div>
        <div class="version">v1.0.0</div>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 左侧配置面板 -->
      <aside class="config-panel">
        <div class="panel-section">
          <h2 class="section-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            基本配置
          </h2>
          
          <div class="form-group">
            <label for="serverUrl">服务器地址</label>
            <input type="text" id="serverUrl" placeholder="http://localhost:3000" value="http://localhost:3000">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="uploadInterval">上传间隔（秒）</label>
              <input type="number" id="uploadInterval" min="1" max="60" value="5">
            </div>
            
            <div class="form-group">
              <label for="maxUploadCount">上传次数</label>
              <input type="number" id="maxUploadCount" min="1" max="100" value="10">
            </div>
          </div>

          <div class="form-group">
            <label for="uploadMode">上传模式</label>
            <select id="uploadMode">
              <option value="sensor">传感器数据上传</option>
              <option value="file">文件上传</option>
            </select>
          </div>
        </div>

        <!-- 传感器选择 -->
        <div class="panel-section" id="sensorSection">
          <h2 class="section-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
            传感器选择
          </h2>
          
          <div class="sensor-grid" id="sensorGrid">
            <!-- 传感器列表将通过 JavaScript 动态生成 -->
          </div>
          
          <div class="button-group">
            <button class="btn btn-secondary" id="selectAllBtn">全选</button>
            <button class="btn btn-secondary" id="deselectAllBtn">取消全选</button>
          </div>
        </div>

        <!-- 文件上传配置 -->
        <div class="panel-section hidden" id="fileSection">
          <h2 class="section-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
              <polyline points="13 2 13 9 20 9"/>
            </svg>
            文件配置
          </h2>
          
          <div class="form-group">
            <label for="filePath">选择文件</label>
            <div class="file-input-group">
              <input type="text" id="filePath" placeholder="请选择文件" readonly>
              <button class="btn btn-secondary" id="selectFileBtn">浏览</button>
            </div>
          </div>

          <div class="form-group">
            <label for="fileUploadUrl">上传地址</label>
            <input type="text" id="fileUploadUrl" placeholder="/api/upload">
          </div>
        </div>
      </aside>

      <!-- 右侧状态面板 -->
      <div class="status-panel">
        <!-- 控制按钮 -->
        <div class="control-section">
          <button class="btn btn-primary btn-large" id="startBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            开始上传
          </button>
          <button class="btn btn-danger btn-large" id="stopBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="6" y="6" width="12" height="12"/>
            </svg>
            停止上传
          </button>
          <button class="btn btn-secondary" id="resetBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
            重置统计
          </button>
        </div>

        <!-- 状态卡片 -->
        <div class="status-cards">
          <div class="status-card">
            <div class="status-icon upload">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </div>
            <div class="status-info">
              <div class="status-label">总上传次数</div>
              <div class="status-value" id="totalCount">0</div>
            </div>
          </div>

          <div class="status-card">
            <div class="status-icon success">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <div class="status-info">
              <div class="status-label">成功次数</div>
              <div class="status-value" id="successCount">0</div>
            </div>
          </div>

          <div class="status-card">
            <div class="status-icon error">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
            </div>
            <div class="status-info">
              <div class="status-label">失败次数</div>
              <div class="status-value" id="failCount">0</div>
            </div>
          </div>

          <div class="status-card">
            <div class="status-icon progress">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="2" x2="12" y2="6"/>
                <line x1="12" y1="18" x2="12" y2="22"/>
                <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
                <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
                <line x1="2" y1="12" x2="6" y2="12"/>
                <line x1="18" y1="12" x2="22" y2="12"/>
                <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
                <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
              </svg>
            </div>
            <div class="status-info">
              <div class="status-label">进度</div>
              <div class="status-value"><span id="currentProgress">0</span> / <span id="maxProgress">0</span></div>
            </div>
          </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-section">
          <div class="progress-header">
            <span>上传进度</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
        </div>

        <!-- 日志区域 -->
        <div class="log-section">
          <div class="log-header">
            <h2 class="section-title">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
              运行日志
            </h2>
            <button class="btn btn-sm btn-secondary" id="clearLogBtn">清空日志</button>
          </div>
          <div class="log-container" id="logContainer">
            <div class="log-item info">
              <span class="log-time">[系统]</span>
              <span class="log-message">准备就绪，等待开始上传...</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- 底部状态栏 -->
    <footer class="app-footer">
      <div class="footer-content">
        <span>智慧农业物联网平台 © 2024</span>
        <span id="statusText">状态：就绪</span>
      </div>
    </footer>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
